[phases.setup]
nixPkgs = ["python312", "postgresql"]

[phases.install]
cmds = ["python -m venv /opt/venv", ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt"]

[start]
cmd = "alembic upgrade head && . /opt/venv/bin/activate && uvicorn app.main:app --host 0.0.0.0 --port ${PORT}"
